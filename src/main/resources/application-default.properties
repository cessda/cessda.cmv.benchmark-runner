# ── Local development overrides ──────────────────────────────────────────────
# This profile is active when running in an IDE or locally without Docker.
# It points the volume paths at directories relative to the project root,
# matching the original CLI behaviour.
#
# Activate with: --spring.profiles.active=local
# Or in your IDE run configuration, set the active profile to "local".

benchmark.data-dir=src/main/resources
benchmark.results-dir=results

# ── Benchmark Algorithm ───────────────────────────────────────
# URI of the Benchmark Assessment Argorithm to use
benchmark.algorithm=https://docs.google.com/spreadsheets/d/1Nk0vM4yBpVQTo_UbB62NY_fz93aRZRHBZGh5fG-khOw
# URI of the instance of FAIR Champion to run
benchmark.runner=https://tools.ostrails.eu/champion/assess/algorithm
# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.cessda.cmv.benchmark=INFO