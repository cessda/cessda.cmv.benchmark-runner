# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ── Volume mount points ──────────────────────────────────────────────────────
# These match the Docker named volumes defined in the Dockerfile / docker run command.
# benchmark-data    → where guids_*.txt files are read and written
# benchmark-results → where JSON result files and summary.json are written
benchmark.data-dir=/data
benchmark.results-dir=/results

# ── SpringDoc / Swagger UI ───────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/api-docs/ui
springdoc.swagger-ui.operationsSorter=alpha
springdoc.info.title=CESSDA FAIR Benchmark Runner API
springdoc.info.description=REST API for the CESSDA CMV FAIR benchmark pipeline
springdoc.info.version=2.0.0

# ── Static resources (HTML dashboard) ───────────────────────────────────────
# Spring Boot serves src/main/resources/static/ at / by default.
# The dashboard HTML fetches results/summary.json etc. relative to its own URL,
# so we also expose the results volume as a static resource path.
spring.web.resources.static-locations=classpath:/static/,file:${benchmark.results-dir}/
spring.web.resources.add-mappings=true

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.cessda.cmv.benchmark=INFO
