<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAIR Benchmark · Language Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0d0f14;
      --surface:   #13161e;
      --border:    #1e2330;
      --border2:   #2a3048;
      --text:      #c8cfe0;
      --muted:     #5a6380;
      --pass:      #3ddc97;
      --pass-dim:  #1a3d2e;
      --fail:      #f05c6e;
      --fail-dim:  #3a1820;
      --indet:     #f0a45c;
      --indet-dim: #3a2810;
      --accent:    #5b8ef0;
      --accent2:   #a78bfa;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 48px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
    }
    .back-btn {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      padding: 6px 12px;
      border: 1px solid var(--border2);
      border-radius: 4px;
      transition: color 0.15s, border-color 0.15s;
    }
    .back-btn:hover { color: var(--accent); border-color: var(--accent); }
    header h1 {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 700;
      color: #e8ecf5;
    }
    .lang-badge {
      background: var(--border2);
      color: var(--accent);
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
    }
    .header-right {
      margin-left: auto;
      color: var(--muted);
      font-size: 11px;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 40px 48px;
    }

    #loading, #error-msg {
      text-align: center;
      padding: 80px 0;
      color: var(--muted);
    }
    #error-msg { color: var(--fail); display: none; }
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .section-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* Summary strip */
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 40px;
    }
    .sum-cell {
      background: var(--surface);
      padding: 24px 28px;
    }
    .sum-cell .sum-label {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .sum-cell .sum-val {
      font-family: 'Fraunces', serif;
      font-size: 36px;
      font-weight: 300;
      color: #e8ecf5;
      line-height: 1;
    }
    .sum-val.pass  { color: var(--pass); }
    .sum-val.fail  { color: var(--fail); }
    .sum-val.indet { color: var(--indet); }

    /* FAIR per-language */
    .fair-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }
    .fair-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 24px;
    }
    .fair-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .fair-letter {
      font-family: 'Fraunces', serif;
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
    }
    .fair-name {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .fair-pct {
      font-family: 'Fraunces', serif;
      font-size: 28px;
      font-weight: 300;
    }
    .fair-bar-bg {
      height: 3px;
      background: var(--border2);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .fair-bar-fill { height: 100%; border-radius: 2px; }
    .fair-tests { font-size: 11px; color: var(--muted); }

    .F .fair-letter, .F .fair-pct { color: #60b8f5; }
    .A .fair-letter, .A .fair-pct { color: var(--pass); }
    .I .fair-letter, .I .fair-pct { color: var(--accent2); }
    .R .fair-letter, .R .fair-pct { color: var(--indet); }
    .F .fair-bar-fill { background: #60b8f5; }
    .A .fair-bar-fill { background: var(--pass); }
    .I .fair-bar-fill { background: var(--accent2); }
    .R .fair-bar-fill { background: var(--indet); }

    /* Test breakdown grid */
    .test-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 40px;
    }
    .test-cell {
      background: var(--bg);
      padding: 16px 20px;
    }
    .test-id {
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .test-fair-badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 2px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .badge-F { background: rgba(96,184,245,0.15); color: #60b8f5; }
    .badge-A { background: rgba(61,220,151,0.15); color: var(--pass); }
    .badge-I { background: rgba(167,139,250,0.15); color: var(--accent2); }
    .badge-R { background: rgba(240,164,92,0.15); color: var(--indet); }

    .test-bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .test-bar-bg {
      flex: 1;
      height: 4px;
      background: var(--border2);
      border-radius: 2px;
      overflow: hidden;
    }
    .test-bar-fill { height: 100%; border-radius: 2px; }
    .fill-pass  { background: var(--pass); }
    .fill-fail  { background: var(--fail); }
    .fill-indet { background: var(--indet); }
    .test-pct { font-size: 11px; min-width: 36px; text-align: right; }
    .test-pct.pass  { color: var(--pass); }
    .test-pct.fail  { color: var(--fail); }
    .test-pct.indet { color: var(--indet); }
    .test-sub { font-size: 10px; color: var(--muted); }

    /* Records table */
    .records-section { margin-bottom: 48px; }

    /* Search / filter bar */
    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      align-items: center;
    }
    .filter-bar input {
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
      flex: 1;
      max-width: 360px;
      outline: none;
      transition: border-color 0.15s;
    }
    .filter-bar input:focus { border-color: var(--accent); }
    .filter-bar input::placeholder { color: var(--muted); }
    .filter-select {
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }
    .rec-count { color: var(--muted); font-size: 11px; margin-left: auto; }

    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr {
      background: var(--surface);
      border-bottom: 1px solid var(--border2);
    }
    thead th {
      padding: 10px 16px;
      text-align: left;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface); }
    tbody td { padding: 12px 16px; vertical-align: middle; }

    .guid-cell {
      font-size: 11px;
      color: var(--muted);
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .guid-cell span { color: var(--accent); }

    .result-chips { display: flex; gap: 4px; flex-wrap: wrap; }
    .chip {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 2px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .chip.pass  { background: var(--pass-dim);  color: var(--pass); }
    .chip.fail  { background: var(--fail-dim);  color: var(--fail); }
    .chip.indet { background: var(--indet-dim); color: var(--indet); }

    .score-col {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 300;
    }
    .score-col.pos { color: var(--pass); }
    .score-col.neg { color: var(--fail); }
    .score-col.zero { color: var(--muted); }

    /* Record detail panel */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      backdrop-filter: blur(4px);
    }
    .detail-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(680px, 100vw);
      background: var(--surface);
      border-left: 1px solid var(--border2);
      overflow-y: auto;
      z-index: 101;
      padding: 32px;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } }
    .panel-close {
      position: absolute;
      top: 20px; right: 24px;
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      width: 32px; height: 32px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, border-color 0.15s;
    }
    .panel-close:hover { color: var(--text); border-color: var(--text); }
    .panel-guid {
      font-size: 11px;
      color: var(--muted);
      word-break: break-all;
      margin-bottom: 24px;
      padding-right: 40px;
      line-height: 1.8;
    }
    .panel-guid a { color: var(--accent); text-decoration: none; }
    .panel-guid a:hover { text-decoration: underline; }
    .panel-section { margin-bottom: 28px; }
    .panel-section-title {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .test-list { display: flex; flex-direction: column; gap: 6px; }
    .test-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--bg);
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    .test-row-id { flex: 0 0 120px; font-size: 11px; color: var(--accent); }
    .test-row-result {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .test-row-result.pass  { background: var(--pass-dim); color: var(--pass); }
    .test-row-result.fail  { background: var(--fail-dim); color: var(--fail); }
    .test-row-result.indeterminate { background: var(--indet-dim); color: var(--indet); }
    .test-row-weight { margin-left: auto; font-size: 11px; color: var(--muted); }

    .narrative-list { display: flex; flex-direction: column; gap: 6px; }
    .narrative-item {
      font-size: 11px;
      color: var(--muted);
      padding: 8px 12px;
      background: var(--bg);
      border-radius: 4px;
      border-left: 3px solid var(--border2);
      line-height: 1.6;
    }
    .narrative-item.unacceptable { border-left-color: var(--fail-dim); color: #9aa0b4; }
    .narrative-item.acceptable { border-left-color: var(--pass-dim); color: var(--pass); }

    .guidance-list { display: flex; flex-direction: column; gap: 6px; }
    .guidance-item {
      font-size: 11px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .guidance-item a {
      color: var(--accent);
      text-decoration: none;
    }
    .guidance-item a:hover { text-decoration: underline; }

    footer {
      border-top: 1px solid var(--border);
      padding: 20px 48px;
      color: var(--muted);
      font-size: 11px;
    }

    @media (max-width: 900px) {
      main { padding: 20px; }
      header { padding: 16px 20px; }
      .summary-strip { grid-template-columns: repeat(2, 1fr); }
      .fair-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">← Back</a>
  <span class="lang-badge" id="hdr-lang">—</span>
  <h1 id="hdr-title">Language Detail</h1>
  <div class="header-right" id="hdr-count"></div>
</header>

<main>
  <div id="loading"><div class="spinner"></div><br>Loading…</div>
  <div id="error-msg"></div>
  <div id="content" style="display:none">

    <!-- Summary strip -->
    <div class="section-label">Summary</div>
    <div class="summary-strip" style="margin-bottom:40px">
      <div class="sum-cell">
        <div class="sum-label">Records</div>
        <div class="sum-val" id="sum-records">—</div>
      </div>
      <div class="sum-cell">
        <div class="sum-label">Pass Rate</div>
        <div class="sum-val pass" id="sum-pass">—</div>
      </div>
      <div class="sum-cell">
        <div class="sum-label">Fail Rate</div>
        <div class="sum-val fail" id="sum-fail">—</div>
      </div>
      <div class="sum-cell">
        <div class="sum-label">Indeterminate</div>
        <div class="sum-val indet" id="sum-indet">—</div>
      </div>
    </div>

    <!-- FAIR cards -->
    <div class="section-label">FAIR Scores</div>
    <div class="fair-row" style="margin-bottom:40px">
      <div class="fair-card F">
        <div class="fair-head">
          <div><div class="fair-letter">F</div><div class="fair-name">Findable</div></div>
          <div class="fair-pct" id="lf-f">—</div>
        </div>
        <div class="fair-bar-bg"><div class="fair-bar-fill" id="lf-f-bar" style="width:0%"></div></div>
        <div class="fair-tests" id="lf-f-sub"></div>
      </div>
      <div class="fair-card A">
        <div class="fair-head">
          <div><div class="fair-letter">A</div><div class="fair-name">Accessible</div></div>
          <div class="fair-pct" id="lf-a">—</div>
        </div>
        <div class="fair-bar-bg"><div class="fair-bar-fill" id="lf-a-bar" style="width:0%"></div></div>
        <div class="fair-tests" id="lf-a-sub"></div>
      </div>
      <div class="fair-card I">
        <div class="fair-head">
          <div><div class="fair-letter">I</div><div class="fair-name">Interoperable</div></div>
          <div class="fair-pct" id="lf-i">—</div>
        </div>
        <div class="fair-bar-bg"><div class="fair-bar-fill" id="lf-i-bar" style="width:0%"></div></div>
        <div class="fair-tests" id="lf-i-sub"></div>
      </div>
      <div class="fair-card R">
        <div class="fair-head">
          <div><div class="fair-letter">R</div><div class="fair-name">Reusable</div></div>
          <div class="fair-pct" id="lf-r">—</div>
        </div>
        <div class="fair-bar-bg"><div class="fair-bar-fill" id="lf-r-bar" style="width:0%"></div></div>
        <div class="fair-tests" id="lf-r-sub"></div>
      </div>
    </div>

    <!-- Per-test breakdown -->
    <div class="section-label">Test Breakdown  <span style="color:var(--muted);font-size:10px;">(pass rate per test across all records)</span></div>
    <div class="test-grid" id="test-grid" style="margin-bottom:40px"></div>

    <!-- Records table -->
    <div class="records-section">
      <div class="section-label">Records</div>
      <div class="filter-bar">
        <input type="text" id="search-input" placeholder="Filter by GUID…" oninput="filterRecords()">
        <select class="filter-select" id="result-filter" onchange="filterRecords()">
          <option value="">All results</option>
          <option value="pass">Has passes</option>
          <option value="fail">Has failures</option>
        </select>
        <span class="rec-count" id="rec-count"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Identifier</th>
              <th>Test Results</th>
              <th>Net Score</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="records-tbody"></tbody>
        </table>
      </div>
    </div>

  </div>
</main>

<footer>CESSDA FAIR Benchmark · <span id="footer-lang"></span> detail view</footer>

<!-- Detail side panel -->
<div class="detail-overlay" id="overlay" onclick="closePanel()"></div>
<div class="detail-panel" id="detail-panel" style="display:none">
  <button class="panel-close" onclick="closePanel()">✕</button>
  <div id="panel-content"></div>
</div>

<script>
  const FAIR_MAP = {
    'F1-PID':'F','F1-GUID':'F','F2A':'F','F2B':'F','F4':'F',
    'A1-1':'A','A1-2':'A',
    'I1-A':'I','I2-A':'I',
    'R1-2-CPI ':'R','R1-2-CPI':'R',
    'R1-3-CEK':'R','R1-3-CTV':'R','R1-3-DMOCV':'R',
    'R1-3-DAUV':'R','R1-3-DTMV':'R','R1-3-DSPV':'R'
  };

  const LANG_NAMES = {
    de:'German', el:'Greek', en:'English', fi:'Finnish', fr:'French',
    hr:'Croatian', nl:'Dutch', sl:'Slovenian', 'sl-SI':'Slovenian (SI)', sv:'Swedish'
  };

  function fairCategory(testId) {
    if (FAIR_MAP[testId]) return FAIR_MAP[testId];
    const t = testId.trim();
    if (FAIR_MAP[t]) return FAIR_MAP[t];
    return t[0] || null;
  }

  function pct(n, d) { return d ? Math.round((n / d) * 100) : 0; }

  let allRecords = [];
  let lang = '';

  // Support both ?lang=de (query string) and #lang=de (hash), for
  // environments where query strings are stripped (e.g. some file servers).
  (function initLang() {
    const qParams = new URLSearchParams(window.location.search);
    const hParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
    lang = qParams.get('lang') || hParams.get('lang') || '';
    if (lang) lang = decodeURIComponent(lang);
  })();

  if (!lang) {
    showError('No language specified. Return to the dashboard and click a language row.');
  } else {
    document.getElementById('hdr-lang').textContent = lang;
    document.getElementById('hdr-title').textContent = LANG_NAMES[lang] || lang;
    document.getElementById('footer-lang').textContent = lang;
  }

  async function loadData() {
    let manifest;
    try {
      const r = await fetch('results/manifest.json');
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      manifest = await r.json();
    } catch (e) {
      showError('Could not load results/manifest.json — ' + e.message);
      return;
    }

    const files = manifest[lang] || [];
    allRecords = [];
    for (const file of files) {
      try {
        const r = await fetch(`results/guids_${lang}/${file}`);
        if (!r.ok) continue;
        allRecords.push(await r.json());
      } catch {}
    }

    renderPage();
  }

  function renderPage() {
    const records = allRecords;
    document.getElementById('hdr-count').textContent = `${records.length} records`;

    let totalPass = 0, totalFail = 0, totalIndet = 0;
    for (const rec of records) {
      if (!rec.test_results) continue;
      for (const v of Object.values(rec.test_results)) {
        if (v.result === 'pass') totalPass++;
        else if (v.result === 'fail') totalFail++;
        else totalIndet++;
      }
    }
    const tot = totalPass + totalFail + totalIndet;

    document.getElementById('sum-records').textContent = records.length;
    document.getElementById('sum-pass').textContent = pct(totalPass, tot) + '%';
    document.getElementById('sum-fail').textContent = pct(totalFail, tot) + '%';
    document.getElementById('sum-indet').textContent = pct(totalIndet, tot) + '%';

    // FAIR cards
    const cats = {F:{p:0,t:0},A:{p:0,t:0},I:{p:0,t:0},R:{p:0,t:0}};
    for (const rec of records) {
      if (!rec.test_results) continue;
      for (const [tid, v] of Object.entries(rec.test_results)) {
        const c = fairCategory(tid);
        if (!cats[c]) continue;
        cats[c].t++;
        if (v.result === 'pass') cats[c].p++;
      }
    }
    for (const [cat, d] of Object.entries(cats)) {
      const p = pct(d.p, d.t);
      const cL = cat.toLowerCase();
      document.getElementById(`lf-${cL}`).textContent = p + '%';
      document.getElementById(`lf-${cL}-sub`).textContent = `${d.p} / ${d.t} tests`;
      setTimeout(() => document.getElementById(`lf-${cL}-bar`).style.width = p + '%', 100);
    }

    // Per-test aggregation
    const testStats = {};
    for (const rec of records) {
      if (!rec.test_results) continue;
      for (const [tid, v] of Object.entries(rec.test_results)) {
        if (!testStats[tid]) testStats[tid] = {pass:0,fail:0,indet:0};
        if (v.result === 'pass') testStats[tid].pass++;
        else if (v.result === 'fail') testStats[tid].fail++;
        else testStats[tid].indet++;
      }
    }
    const testGrid = document.getElementById('test-grid');
    testGrid.innerHTML = '';
    for (const [tid, st] of Object.entries(testStats)) {
      const t = st.pass + st.fail + st.indet;
      const pp = pct(st.pass, t);
      const fp = pct(st.fail, t);
      const ip = 100 - pp - fp;
      const cat = fairCategory(tid);
      const cell = document.createElement('div');
      cell.className = 'test-cell';
      cell.innerHTML = `
        <div class="test-id">
          ${tid.trim()}
          ${cat ? `<span class="test-fair-badge badge-${cat}">${cat}</span>` : ''}
        </div>
        <div class="test-bar-row">
          <span style="font-size:9px;color:var(--pass);min-width:20px">P</span>
          <div class="test-bar-bg"><div class="test-bar-fill fill-pass" style="width:${pp}%"></div></div>
          <span class="test-pct pass">${pp}%</span>
        </div>
        <div class="test-bar-row">
          <span style="font-size:9px;color:var(--fail);min-width:20px">F</span>
          <div class="test-bar-bg"><div class="test-bar-fill fill-fail" style="width:${fp}%"></div></div>
          <span class="test-pct fail">${fp}%</span>
        </div>
        <div class="test-bar-row">
          <span style="font-size:9px;color:var(--indet);min-width:20px">I</span>
          <div class="test-bar-bg"><div class="test-bar-fill fill-indet" style="width:${ip}%"></div></div>
          <span class="test-pct indet">${ip}%</span>
        </div>
        <div class="test-sub">${t} records</div>
      `;
      testGrid.appendChild(cell);
    }

    renderTable(records);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  }

  function renderTable(records) {
    const tbody = document.getElementById('records-tbody');
    tbody.innerHTML = '';
    document.getElementById('rec-count').textContent = `${records.length} records`;

    for (const rec of records) {
      const results = rec.test_results || {};
      let netScore = 0;
      const chips = [];
      for (const [tid, v] of Object.entries(results)) {
        netScore += (v.weight || 0);
        chips.push(`<span class="chip ${v.result === 'indeterminate' ? 'indet' : v.result}">${tid.trim()}</span>`);
      }
      const scoreClass = netScore > 0 ? 'pos' : netScore < 0 ? 'neg' : 'zero';
      const guid = rec.testedguid || '';
      // Extract just the identifier hash from the URL for display
      const hashMatch = guid.match(/identifier=([^&]+)$/);
      const shortHash = hashMatch ? hashMatch[1].substring(0, 16) + '…' : guid.substring(0, 30) + '…';

      const tr = document.createElement('tr');
      tr.dataset.guid = guid.toLowerCase();
      tr.dataset.results = JSON.stringify(results);
      tr.innerHTML = `
        <td class="guid-cell" title="${guid}"><span>${shortHash}</span></td>
        <td><div class="result-chips">${chips.join('')}</div></td>
        <td><span class="score-col ${scoreClass}">${netScore > 0 ? '+' : ''}${netScore.toFixed(1)}</span></td>
        <td style="color:var(--muted);font-size:16px">→</td>
      `;
      tr.addEventListener('click', () => openPanel(rec));
      tbody.appendChild(tr);
    }
  }

  function filterRecords() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const rf = document.getElementById('result-filter').value;
    const filtered = allRecords.filter(rec => {
      const guid = (rec.testedguid || '').toLowerCase();
      if (q && !guid.includes(q)) return false;
      if (rf) {
        const vals = Object.values(rec.test_results || {}).map(v => v.result);
        if (!vals.includes(rf)) return false;
      }
      return true;
    });
    renderTable(filtered);
  }

  function openPanel(rec) {
    const results = rec.test_results || {};
    const guid = rec.testedguid || '';

    const testRows = Object.entries(results).map(([tid, v]) => `
      <div class="test-row">
        <span class="test-row-id">${tid.trim()}</span>
        <span class="test-row-result ${v.result === 'indeterminate' ? 'indeterminate' : v.result}">${v.result}</span>
        <span class="test-row-weight">weight: ${v.weight}</span>
      </div>
    `).join('');

    const narrativeRows = (rec.narratives || []).map(n => {
      const cls = n.toLowerCase().startsWith('unacceptable') ? 'unacceptable' : 'acceptable';
      return `<div class="narrative-item ${cls}">${n}</div>`;
    }).join('');

    const guidanceRows = (rec.guidances || []).map(group => {
      return group.map(([url, label]) =>
        `<div class="guidance-item"><a href="${url}" target="_blank" rel="noopener">↗ ${label}</a></div>`
      ).join('');
    }).join('');

    document.getElementById('panel-content').innerHTML = `
      <div class="panel-guid">
        <a href="${guid}" target="_blank" rel="noopener">${guid}</a>
      </div>
      <div class="panel-section">
        <div class="panel-section-title">Test Results</div>
        <div class="test-list">${testRows}</div>
      </div>
      ${narrativeRows ? `<div class="panel-section">
        <div class="panel-section-title">Narratives</div>
        <div class="narrative-list">${narrativeRows}</div>
      </div>` : ''}
      ${guidanceRows ? `<div class="panel-section">
        <div class="panel-section-title">Guidance</div>
        <div class="guidance-list">${guidanceRows}</div>
      </div>` : ''}
    `;

    document.getElementById('overlay').style.display = 'block';
    document.getElementById('detail-panel').style.display = 'block';
    document.body.style.overflow = 'hidden';
  }

  function closePanel() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('detail-panel').style.display = 'none';
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error-msg');
    el.style.display = 'block';
    el.textContent = msg;
  }

  if (lang) loadData();
</script>
</body>
</html>
